<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找不到頁面 — 漫漫行銷</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .not-found {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .not-found-inner { max-width: 480px; }
    .not-found-code { font-size: 96px; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 16px; }
    .not-found h1 { font-size: 24px; margin-bottom: 12px; }
    .not-found p { color: var(--gray-500); margin-bottom: 32px; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <div class="logo-icon">漫</div>
      漫漫行銷
    </a>
  </div>
</nav>
<main class="not-found">
  <div class="not-found-inner">
    <div class="not-found-code">404</div>
    <h1>找不到這個頁面</h1>
    <p>頁面可能已移除或連結有誤，請回首頁重新瀏覽。</p>
    <a href="index.html" class="btn btn-primary btn-lg">回首頁</a>
  </div>
</main>
<script src="lucide.min.js"></script>
<script src="app.js"></script>
</body>
</html>
